{% extends 'base.html' %}


{% block content %}
{% load crispy_forms_tags %}

<div class="row">
    <!-- Left sidebar -->
    <!-- load the sidebar here -->
    {% include 'sidebar.html' %}
{% if can_edit %}
    <!-- Right side content -->
    <div class="col-md-9">
        <h2>Edit Category</h2>

        <form action="{% url 'edit_category' category.pk %}" method="POST" style="width:500px;">
            {% csrf_token %}
            {{ form | crispy }}
            <button type="submit" class="btn btn-warning">Submit</button>
            <a href="{% url 'categories' %}" class="btn btn-secondary">Cancel</a>
        </form>
        <br>
    </div>
{% else %}
    <p style="color:red;">You are not allowed to edit this category.</p>
{% endif %}
</div>

{% endblock %}
