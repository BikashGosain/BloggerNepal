<div class="col-md-3">
    <div class="nav flex-column nav-pills bg-light" aria-orientation="vertical">
        <a href="{% url 'dashboard' %}"
            class="nav-link text-dark {% if '/dashboard/' == request.path %}bg-warning{% endif %}">Dashboard</a>
            <a href="{% url 'posts_per_category' %}"
            class="nav-link text-dark {% if '/posts_per_category/' == request.path %}bg-warning{% endif %}">Posts Per Category</a>
            <a href="{% url 'posts_per_month' %}"
            class="nav-link text-dark {% if '/posts_per_month/' == request.path %}bg-warning{% endif %}">Posts Per Month</a>
        <a href="{% url 'profile' %}"
            class="nav-link text-dark {% if '/profile/' in request.path %}bg-warning{% endif %}">Profile</a>
        <a href="{% url 'dashboardfollowers_list' request.user.username %}"
            class="nav-link text-dark {% if '/dashboardfollowers_list/' in request.path %}bg-warning{% endif %}">Followers</a>
        <a href="{% url 'dashboardfollowing_list' request.user.username %}"
            class="nav-link text-dark {% if '/dashboardfollowing_list/' in request.path %}bg-warning{% endif %}">Following</a>
        <a href="{% url 'dashboardnotification' %}"
            class="nav-link text-dark {% if '/dashboardnotification/' in request.path %}bg-warning{% endif %}">Notification
            {%if unread_count > 0 %}
            <span style="color:red; font-weight:bold;">({{ unread_count }})</span>
            {% endif %} </a>
        {% if perms.auth.view_user %}
        <a href="{% url 'users' %}"
            class="nav-link text-dark {% if '/users/' in request.path %}bg-warning{% endif %}">Users</a>
        {% endif %}
        {% if can_see_all%}
        <a href="{% url 'categories' %}"
            class="nav-link text-dark {% if '/categories/' in request.path %}bg-warning{% endif %}">Categories</a>
        {% endif %}
        <a href="{% url 'posts' %}"
            class="nav-link text-dark {% if '/posts/' in request.path %}bg-warning{% endif %}">Posts</a>

        <a href="{% url 'logout' %}" class="nav-link text-dark {% if '/logout/' in request.path %}bg-warning{% endif %}"
            onclick="return confirm('Are you sure you want to logout?');">
            Logout
        </a>

    </div><br>
</div>
