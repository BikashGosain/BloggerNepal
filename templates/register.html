{% extends 'base.html' %}
{% load socialaccount %}

{% block content %}
    <div class="auth-container">
        <div class="auth-card">
            <h3 class="auth-title">Create Account</h3>
            
            <!-- Social Signup Buttons -->
            <div class="social-buttons">
                <a class="social-btn google-btn" href="{% provider_login_url 'google' %}">
                    <span class="btn-icon">G</span>
                    <span class="btn-text">Sign up with Google</span>
                </a>
                
                <a class="social-btn github-btn" href="{% provider_login_url 'github' %}">
                    <span class="btn-icon">⚡</span>
                    <span class="btn-text">Sign up with GitHub</span>
                </a>
            </div>

            <div class="divider">
                <span class="divider-text">or</span>
            </div>

            <form action="{% url 'register' %}" method="POST" class="auth-form">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="submit-btn">Create Account</button>
            </form>
            
            <div class="auth-footer">
                <span>Already have an account? </span>
                <a href="{% url 'login' %}" class="link-accent">Sign in</a>
            </div>
        </div>
    </div>
{% endblock %}
