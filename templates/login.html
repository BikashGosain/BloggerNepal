{% extends 'base.html' %}
{% load socialaccount %}

{% block content %}
    <div class="auth-container">
        <div class="auth-card">
            <h3 class="auth-title">Welcome Back</h3>
            
            <!-- Social Login Buttons -->
            <div class="social-buttons">
                <a class="social-btn google-btn" href="{% provider_login_url 'google' %}">
                    <span class="btn-icon">G</span>
                    <span class="btn-text">Continue with Google</span>
                </a>
                
                <a class="social-btn github-btn" href="{% provider_login_url 'github' %}">
                    <span class="btn-icon">⚡</span>
                    <span class="btn-text">Continue with GitHub</span>
                </a>
            </div>

            <div class="divider">
                <span class="divider-text">or</span>
            </div>

            <form action="{% url 'login' %}" method="POST" class="auth-form">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="submit-btn">Sign In</button>
            </form>
            
            <!-- Forgot Password Link -->
            <div class="auth-link">
                <a href="{% url 'forgot_password' %}" class="link-primary">Forgot Password?</a>
            </div>
            
            <div class="auth-footer">
                <span>Don't have an account? </span>
                <a href="{% url 'register' %}" class="link-accent">Create one</a>
            </div>
        </div>
    </div>
{% endblock %}
