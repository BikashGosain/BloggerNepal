<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 - Bad Request</title>
    <link rel="stylesheet" href="/static/css/error-pages.css">
</head>
<body>
    <div class="ep-error-container">
        <div class="ep-error-card ep-error-400">
            <div class="ep-icon">⚠️</div>
            <h1 class="ep-error-code">400</h1>
            <h2 class="ep-error-title">Bad Request</h2>
            <p class="ep-error-message">Your request is invalid. Please check and try again.</p>
            <div class="ep-error-actions">
                <a href="javascript:history.length > 1 ? history.back() : '{% url 'home' %}'" class="ep-btn ep-btn-secondary">
                    ← Go Back
                </a>
                <a href="{% url 'home' %}" class="ep-btn ep-btn-primary">
                    🏠 Go to Home
                </a>
            </div>
        </div>
    </div>
</body>
</html>
