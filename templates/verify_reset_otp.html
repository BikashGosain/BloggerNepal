{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning text-white text-center">
                    <h3>Verify OTP</h3>
                </div>
                <div class="card-body">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}

                    <p class="text-center">Enter the OTP sent to your email.</p>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="otp" class="form-label">Enter OTP</label>
                            <input type="text" class="form-control" id="otp" name="otp" 
                                   placeholder="Enter 6-digit OTP" maxlength="6" required>
                        </div>
                        <button type="submit" class="btn btn-warning w-100">Verify OTP</button>
                    </form>

                    <div class="text-center mt-3">
                        <small>Didn't receive OTP? 
                            <a href="{% url 'resend_reset_otp' %}" class="text-warning fw-bold">Resend OTP</a>
                        </small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
