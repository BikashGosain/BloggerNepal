{% for about in about %}
<div class="homepage-widget homepage-about">
    
    <h4 class="homepage-widget-title">
        Q{{ forloop.counter }}. {{ about.question }}
    </h4>

    <p class="homepage-about-description">
        <strong>Ans:</strong> <em>{{ about.answer }}</em>
    </p>

</div>
{% endfor %}
